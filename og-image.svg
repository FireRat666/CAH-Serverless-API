<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 630" width="1200" height="630">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#050705"/>
      <stop offset="100%" stop-color="#0c120c"/>
    </linearGradient>
    <linearGradient id="accentGrad" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#2bff00"/>
      <stop offset="100%" stop-color="#00da07"/>
    </linearGradient>
    <filter id="cardShadow">
      <feDropShadow dx="0" dy="8" stdDeviation="16" flood-color="#000" flood-opacity="0.6"/>
    </filter>
  </defs>

  <!-- Background -->
  <rect width="1200" height="630" fill="url(#bg)"/>

  <!-- Subtle grid pattern -->
  <g opacity="0.04">
    <line x1="0" y1="100" x2="1200" y2="100" stroke="#fff" stroke-width="0.5"/>
    <line x1="0" y1="200" x2="1200" y2="200" stroke="#fff" stroke-width="0.5"/>
    <line x1="0" y1="300" x2="1200" y2="300" stroke="#fff" stroke-width="0.5"/>
    <line x1="0" y1="400" x2="1200" y2="400" stroke="#fff" stroke-width="0.5"/>
    <line x1="0" y1="500" x2="1200" y2="500" stroke="#fff" stroke-width="0.5"/>
    <line x1="300" y1="0" x2="300" y2="630" stroke="#fff" stroke-width="0.5"/>
    <line x1="600" y1="0" x2="600" y2="630" stroke="#fff" stroke-width="0.5"/>
    <line x1="900" y1="0" x2="900" y2="630" stroke="#fff" stroke-width="0.5"/>
  </g>

  <!-- Decorative accent line -->
  <rect x="0" y="0" width="6" height="630" fill="url(#accentGrad)"/>

  <!-- Title section -->
  <text x="80" y="200" font-family="Inter, 'Segoe UI', system-ui, sans-serif" font-size="64" font-weight="800" fill="#ffffff" letter-spacing="-1.5">CAH Serverless</text>
  <text x="80" y="275" font-family="Inter, 'Segoe UI', system-ui, sans-serif" font-size="64" font-weight="800" fill="#2bff00" letter-spacing="-1.5">API</text>

  <!-- Tagline -->
  <text x="80" y="330" font-family="Inter, 'Segoe UI', system-ui, sans-serif" font-size="20" font-weight="400" fill="#94b895">A blazing fast, free serverless API for Cards Against Humanity.</text>
  <text x="80" y="358" font-family="Inter, 'Segoe UI', system-ui, sans-serif" font-size="20" font-weight="400" fill="#94b895">Fetch sets, random cards, and combined decks in JSON format.</text>

  <!-- Badge -->
  <rect x="80" y="385" width="220" height="36" rx="18" fill="rgba(43,255,0,0.12)" stroke="#2bff00" stroke-width="1"/>
  <text x="190" y="409" font-family="Inter, 'Segoe UI', system-ui, sans-serif" font-size="14" font-weight="700" fill="#2bff00" text-anchor="middle">Vercel &amp; Netlify Native</text>

  <!-- Cards illustration -->
  <!-- Black card (Request) -->
  <g transform="translate(680, 100)" filter="url(#cardShadow)">
    <rect x="0" y="0" width="220" height="320" rx="14" fill="#121612" stroke="rgba(43,255,0,0.2)" stroke-width="1.5"/>
    <text x="110" y="45" font-family="Inter, 'Segoe UI', system-ui, sans-serif" font-size="12" font-weight="800" fill="#2bff00" text-anchor="middle" letter-spacing="2">API REQUEST</text>
    
    <!-- Code terminal mockup -->
    <rect x="15" y="70" width="190" height="160" rx="8" fill="#060806" stroke="rgba(255,255,255,0.05)" stroke-width="1"/>
    <text x="30" y="110" font-family="'Courier New', Courier, monospace" font-size="14" font-weight="700" fill="#2bff00">GET</text>
    <text x="30" y="135" font-family="'Courier New', Courier, monospace" font-size="13" font-weight="700" fill="#ffffff">/api/sets/0</text>
    <text x="30" y="160" font-family="'Courier New', Courier, monospace" font-size="13" font-weight="700" fill="#94b895">?n=3</text>
    
    <text x="30" y="285" font-family="Inter, 'Segoe UI', system-ui, sans-serif" font-size="10" font-weight="700" fill="#5e8363" letter-spacing="1">ENDPOINT DECK_0</text>
  </g>

  <!-- White card (Response) -->
  <g transform="translate(910, 140) rotate(4)" filter="url(#cardShadow)">
    <rect x="0" y="0" width="220" height="320" rx="14" fill="#ffffff" stroke="rgba(0,0,0,0.05)" stroke-width="1"/>
    <text x="110" y="45" font-family="Inter, 'Segoe UI', system-ui, sans-serif" font-size="11" font-weight="800" fill="#121612" text-anchor="middle" letter-spacing="2">JSON RESPONSE</text>
    
    <!-- JSON code mockup -->
    <rect x="15" y="70" width="190" height="175" rx="8" fill="#f5fbf5" stroke="rgba(0,0,0,0.04)" stroke-width="1"/>
    <text x="25" y="100" font-family="'Courier New', Courier, monospace" font-size="12" font-weight="700" fill="#000000">[</text>
    <text x="35" y="125" font-family="'Courier New', Courier, monospace" font-size="11" font-weight="700" fill="#0b7a00">  "Lines of Koch.",</text>
    <text x="35" y="150" font-family="'Courier New', Courier, monospace" font-size="11" font-weight="700" fill="#0b7a00">  "Canadians.",</text>
    <text x="35" y="175" font-family="'Courier New', Courier, monospace" font-size="11" font-weight="700" fill="#0b7a00">  "A boxing match."</text>
    <text x="25" y="205" font-family="'Courier New', Courier, monospace" font-size="12" font-weight="700" fill="#000000">]</text>
    
    <text x="30" y="285" font-family="Inter, 'Segoe UI', system-ui, sans-serif" font-size="10" font-weight="700" fill="#94b895" letter-spacing="1">STATUS 200 OK</text>
  </g>

  <!-- Decorative circles -->
  <circle cx="1100" cy="50" r="3" fill="#2bff00" opacity="0.3"/>
  <circle cx="650" cy="550" r="4" fill="#2bff00" opacity="0.2"/>
  <circle cx="1150" cy="600" r="2" fill="#2bff00" opacity="0.4"/>
  <circle cx="50" cy="570" r="3" fill="#2bff00" opacity="0.15"/>

  <!-- GitHub corner marker -->
  <text x="80" y="580" font-family="'Courier New', monospace" font-size="14" fill="#5e8363">github.com/FireRat666/CAH-Serverless-API</text>
</svg>
